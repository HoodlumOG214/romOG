name: Generate ROM Database

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: db/requirements.txt

      - name: Cache scraped data
        uses: actions/cache@v4
        with:
          path: |
            db/cache
            db/data
          key: scraper-cache-${{ github.run_number }}
          restore-keys: |
            scraper-cache-

      - name: Mirror MiNERVA artefacts
        # ETag-cached; only re-downloads when the upstream files change.
        # hashes.db is ~1.8 GB so this matters. Skipping on failure
        # leaves the MiNERVA scraper to no-op rather than failing the
        # whole build.
        run: |
          mkdir -p data/minerva
          set -e
          fetch_if_changed() {
            local url=$1
            local dest=$2
            local etag_file="$dest.etag"
            local existing_etag=""
            if [ -f "$etag_file" ]; then
              existing_etag=$(cat "$etag_file")
            fi
            local response_headers
            response_headers=$(curl -sI -A "Mozilla/5.0" "$url")
            local remote_etag
            remote_etag=$(printf '%s' "$response_headers" \
              | awk -F': *' 'tolower($1)=="etag" {print $2}' | tr -d '\r"')
            if [ -n "$remote_etag" ] && [ "$remote_etag" = "$existing_etag" ] && [ -s "$dest" ]; then
              echo "  [minerva] $dest unchanged (etag $existing_etag), skipping download"
              return 0
            fi
            echo "  [minerva] fetching $url -> $dest"
            curl -fSL -A "Mozilla/5.0" --retry 3 --retry-delay 10 -o "$dest" "$url" || {
              echo "  [minerva] download failed; leaving stale copy (if any) in place"
              return 0
            }
            if [ -n "$remote_etag" ]; then
              printf '%s' "$remote_etag" > "$etag_file"
            fi
          }
          fetch_if_changed https://minerva-archive.org/assets/index.txt.gz data/minerva/index.txt.gz
          fetch_if_changed https://minerva-archive.org/assets/hashes.db    data/minerva/hashes.db

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Create Internet Archive credentials
        env:
          IA_USERNAME: ${{ secrets.IA_USERNAME }}
          IA_PASSWORD: ${{ secrets.IA_PASSWORD }}
        run: |
          if [ -n "$IA_USERNAME" ]; then
            mkdir -p secrets
            python -c "import json,os; json.dump({'username':os.environ['IA_USERNAME'],'password':os.environ['IA_PASSWORD']}, open('secrets/internet_archive_creds.json','w'))"
          fi

      - name: Run database generation workflow
        run: python workflow.py

      - name: Compress database
        run: gzip -f -k romdb.db

      - name: Get database stats
        id: stats
        run: |
          DB_SIZE=$(stat -c%s romdb.db)
          GZ_SIZE=$(stat -c%s romdb.db.gz)
          ENTRY_COUNT=$(sqlite3 romdb.db "SELECT COUNT(*) FROM entries")
          LINK_COUNT=$(sqlite3 romdb.db "SELECT COUNT(*) FROM links")
          PLATFORM_COUNT=$(sqlite3 romdb.db "SELECT COUNT(DISTINCT platform) FROM entries")
          SOURCE_COUNT=$(sqlite3 romdb.db "SELECT COUNT(*) FROM sources")
          SCHEMA_VERSION=$(python -c "from database import db_manager; print(db_manager.SCHEMA_VERSION)")
          echo "db_size=$DB_SIZE" >> $GITHUB_OUTPUT
          echo "gz_size=$GZ_SIZE" >> $GITHUB_OUTPUT
          echo "entry_count=$ENTRY_COUNT" >> $GITHUB_OUTPUT
          echo "link_count=$LINK_COUNT" >> $GITHUB_OUTPUT
          echo "platform_count=$PLATFORM_COUNT" >> $GITHUB_OUTPUT
          echo "source_count=$SOURCE_COUNT" >> $GITHUB_OUTPUT
          echo "schema_version=$SCHEMA_VERSION" >> $GITHUB_OUTPUT

      - name: Create version.json
        run: |
          cat > version.json << EOF
          {
            "version": "$(date +%Y%m%d)",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "schema_version": ${{ steps.stats.outputs.schema_version }},
            "min_app_version": "1.2.0",
            "size": ${{ steps.stats.outputs.gz_size }},
            "uncompressed_size": ${{ steps.stats.outputs.db_size }},
            "entries": ${{ steps.stats.outputs.entry_count }},
            "links": ${{ steps.stats.outputs.link_count }},
            "platforms": ${{ steps.stats.outputs.platform_count }},
            "sources": ${{ steps.stats.outputs.source_count }}
          }
          EOF

      - name: Commit database to repository
        working-directory: .
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add db/romdb.db.gz db/version.json
          git commit -m "Update database $(date +%Y%m%d) - ${{ steps.stats.outputs.entry_count }} entries" || exit 0
          git pull --rebase
          git push
