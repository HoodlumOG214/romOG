id: minerva
name: MiNERVA Archive
homepage: https://minerva-archive.org
kind: catalog
priority: 200
auth:
  required: false
delivery: torrent
capabilities:
  - torrent_distribution
  - selective_file_download   # multi-ROM packs; per-file libtorrent priorities
  - filename_listing
platforms:
  - 32x
  - 3do
  - 3ds
  - a26
  - a52
  - a78
  - cdi
  - cv
  - dc
  - dsi
  - fds
  - fmt
  - gb
  - gba
  - gbc
  - gc
  - gg
  - intv
  - jag
  - jcd
  - lynx
  - min
  - n3ds
  - n64
  - ndd
  - nds
  - nes
  - ngcd
  - pc98
  - pcfx
  - pip
  - ps1
  - ps2
  - ps3
  - psp
  - psv
  - sat
  - scd
  - smd
  - sms
  - snes
  - tg16
  - tgcd
  - vb
  - wii
  - wiiu
  - x360
  - xbox
notes: |
  ROMs are distributed as torrents — typically multi-ROM packs. The
  scraper joins assets/index.txt.gz (paths) with assets/hashes.db
  (per-file magnets/so_id) and emits one entry per ROM file with
  (torrent_infohash, torrent_file_index) for selective download.

  platforms.yml entries put MiNERVA path prefixes in `urls`, e.g.
  './No-Intro/Nintendo - Nintendo Entertainment System (Headered)/'.
